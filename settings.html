<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BidCraft – Settings</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- NAV -->
  <nav>
    <a href="index.html" class="nav-logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/>
      </svg>
      BidCraft
    </a>
    <ul class="nav-links">
      <li><a href="index.html">Bid Generator</a></li>
      <li><a href="settings.html" class="active">Settings</a></li>
    </ul>
    <button class="theme-toggle" id="themeToggle" title="Toggle dark/light mode">
      <span class="toggle-icon">🌙</span>
      <span class="toggle-label">Dark</span>
    </button>
  </nav>

  <!-- MAIN -->
  <div class="container">
    <div class="settings-grid">

      <!-- LEFT COLUMN -->
      <div>

        <!-- Profile Photo -->
        <div class="card" style="margin-bottom:20px;">
          <div class="card-title">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/>
            </svg>
            Profile
          </div>

          <div class="avatar-upload">
            <div id="avatar-placeholder" class="avatar-placeholder">👤</div>
            <img id="avatar-preview" class="avatar-preview" src="" alt="Profile photo" style="display:none;" />
            <div style="text-align:center;">
              <label for="photo-input" class="btn btn-outline" style="cursor:pointer; display:inline-flex;">
                📷 Upload Photo
              </label>
              <input type="file" id="photo-input" accept="image/*" style="display:none;" />
              <button id="remove-photo" class="btn btn-danger" style="display:none; margin-top:8px;">Remove</button>
            </div>
          </div>

          <div class="form-group" style="margin-top:20px;">
            <label for="display-name">Your Name</label>
            <input type="text" id="display-name" placeholder="e.g. Alex Johnson" />
          </div>


        </div>

        <!-- API Key -->
        <div class="card">
          <div class="card-title">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/>
            </svg>
            AI Provider &amp; API Key
          </div>

          <div class="provider-tabs">
            <button class="provider-tab active" data-provider="openai">OpenAI</button>
            <button class="provider-tab" data-provider="gemini">Gemini</button>
          </div>

          <div id="openai-field" class="key-field active form-group">
            <label for="openai-key">OpenAI API Key</label>
            <input type="password" id="openai-key" placeholder="sk-..." autocomplete="off" />
            <p class="input-hint">Get your key at <a href="https://platform.openai.com/api-keys" target="_blank" style="color:var(--primary);">platform.openai.com</a></p>
          </div>

          <div id="gemini-field" class="key-field form-group">
            <label for="gemini-key">Gemini API Key</label>
            <input type="password" id="gemini-key" placeholder="AIza..." autocomplete="off" />
            <p class="input-hint">Get your key at <a href="https://aistudio.google.com/app/apikey" target="_blank" style="color:var(--primary);">Google AI Studio</a></p>
          </div>
        </div>

      </div>

      <!-- RIGHT COLUMN -->
      <div>

        <!-- Bid Style / Prompt -->
        <div class="card">
          <div class="card-title">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/>
            </svg>
            Bid Style &amp; Prompt
          </div>

          <div class="form-group">
            <label for="bid-style">Bid Style</label>
            <select id="bid-style">
              <option value="professional">Professional &amp; Formal</option>
              <option value="friendly">Friendly &amp; Conversational</option>
              <option value="concise">Short &amp; Concise</option>
              <option value="detailed">Detailed &amp; Comprehensive</option>
              <option value="custom">Custom (use prompt below)</option>
            </select>
            <p class="input-hint">Defines the overall tone of your generated bids.</p>
          </div>

          <div class="form-group">
            <label for="bid-prompt">Custom Bid Prompt</label>
            <textarea id="bid-prompt" rows="7" maxlength="2000"
              placeholder="Describe how you want your bids to be written. For example:&#10;&#10;Write a compelling bid for a freelancer. Always start with a personalised opener that references the project. Highlight relevant experience. End with a confident call to action. Keep it under 200 words."></textarea>
            <div class="char-counter"><span id="prompt-count">0</span> / 2000</div>
          </div>


        </div>

      </div>
    </div>

    <!-- Save bar -->
    <div style="display:flex; align-items:center; justify-content:flex-end; gap:16px; margin-top:24px;">
      <span id="saved-badge" class="saved-badge">
        ✅ Saved
      </span>
      <button id="save-btn" class="btn btn-primary">
        💾 Save Settings
      </button>
    </div>

  </div>

  <div id="toast"></div>

  <script src="theme.js"></script>
  <script src="settings.js"></script>
</body>
</html>
