<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BidCraft – Settings</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="dark">

  <!-- NAV -->
  <nav>
    <div class="nav-left">
      <a href="index.html" class="nav-logo">
        <img src="favicon.svg" alt="BidCraft" class="nav-logo-img" />
        BidCraft
      </a>
    </div>
    <div class="nav-pills">
      <span class="pill pill-green">$ —</span>
      <span class="pill pill-outline">⏱ —</span>
    </div>
    <div class="nav-right">
      <a href="index.html" class="nav-link">Bids Generator</a>
      <a href="settings.html" class="nav-link active">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
        Settings
      </a>
      <button class="theme-toggle" id="themeToggle">
        <span class="toggle-icon">☀️</span>
      </button>
    </div>
  </nav>

  <!-- MAIN -->
  <div class="container">
    <h1 class="page-title">Settings</h1>
    <p class="page-subtitle">Register the freelancers you bid as. Their bid prompt shapes every generated proposal.</p>

    <!-- API KEY ROW -->
    <div class="api-bar">
      <div class="api-bar-group">
        <label class="api-label">AI Provider</label>
        <div class="provider-tabs">
          <button class="provider-tab active" data-provider="openai">OpenAI</button>
          <button class="provider-tab" data-provider="gemini">Gemini</button>
        </div>
      </div>
      <div class="api-bar-group api-key-group">
        <div id="openai-field" class="key-field active">
          <label class="api-label" for="openai-key">OpenAI API Key</label>
          <div class="key-input-row">
            <input type="password" id="openai-key" placeholder="sk-…" autocomplete="off" />
            <button class="btn btn-ghost-sm toggle-key-btn" data-target="openai-key">Show</button>
          </div>
        </div>
        <div id="gemini-field" class="key-field">
          <label class="api-label" for="gemini-key">Gemini API Key</label>
          <div class="key-input-row">
            <input type="password" id="gemini-key" placeholder="AIza… or AQ.…" autocomplete="off" />
            <button class="btn btn-ghost-sm toggle-key-btn" data-target="gemini-key">Show</button>
          </div>
        </div>
      </div>
      <button id="save-api-btn" class="btn btn-green save-api-btn">Save Key</button>
      <span id="api-saved" class="saved-badge">✅ Saved</span>
    </div>

    <div class="settings-grid">

      <!-- LEFT: Add freelancer form -->
      <div class="panel">
        <h3 class="panel-title">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          <span id="form-mode-title">Add freelancer</span>
        </h3>

        <div class="freelancer-form">
          <!-- Photo upload -->
          <div class="photo-row">
            <div class="photo-wrap">
              <div id="form-photo-placeholder" class="photo-placeholder-lg">?</div>
              <img id="form-photo-preview" class="photo-preview-lg" src="" alt="" style="display:none;" />
            </div>
            <label for="form-photo-input" class="btn btn-ghost-sm upload-btn">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
              Upload photo
            </label>
            <input type="file" id="form-photo-input" accept="image/*" style="display:none;" />
          </div>

          <div class="form-group">
            <label for="form-name">Name</label>
            <input type="text" id="form-name" placeholder="e.g. Alex Morgan" />
          </div>

          <div class="form-group">
            <label for="form-prompt">Bid prompt</label>
            <textarea id="form-prompt" rows="8"
              placeholder="Voice, tone, skills, signature line, language… e.g. 'Friendly, confident, mention 8 years of React experience, end with a clear next step.'"></textarea>
            <p class="input-hint">This is injected into every bid generation for this freelancer.</p>
          </div>

          <button id="add-btn" class="btn btn-green">Add freelancer</button>
          <button id="cancel-edit-btn" class="btn btn-ghost-sm" style="display:none; margin-left:10px;">Cancel</button>
        </div>
      </div>

      <!-- RIGHT: Registered freelancers list -->
      <div class="panel">
        <h3 class="panel-title">Registered freelancers</h3>
        <div id="freelancer-list" class="freelancer-list">
          <p class="empty-list">No freelancers added yet.</p>
        </div>
      </div>

    </div>
  </div>

  <div id="toast"></div>

  <script src="theme.js"></script>
  <script src="settings.js"></script>
</body>
</html>
